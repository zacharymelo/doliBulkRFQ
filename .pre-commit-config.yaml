repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: fix-byte-order-marker
      - id: check-json
  - repo: https://github.com/digitalpulp/pre-commit-php
    rev: 1.4.0
    hooks:
      - id: php-lint
      - id: php-cbf
        args: ['--standard=/Users/zacharymelo/.dolibarr-dev/codesniffer/ruleset.xml', '--extensions=php']
        files: \.(php)$
      - id: php-cs
        args: ['--standard=/Users/zacharymelo/.dolibarr-dev/codesniffer/ruleset.xml', '--extensions=php', '-s']
        files: \.(php)$
